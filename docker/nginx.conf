user nginx;
worker_processes auto;
pid /run/nginx.pid;
error_log syslog:server=unix:/dev/log,tag=nginx error;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    server_tokens off;
    keepalive_timeout 30s;
    client_max_body_size 101m;
    sendfile on;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Block known bad bots and scrapers
    map $http_user_agent $blocked_agent {
        default         0;
        ~*LWP::Simple   1;
        ~*BBBike        1;
        ~*wget          1;
        ~*msnbot        1;
        ~*scrapbot      1;
    }

    # Block spam referers
    map $http_referer $blocked_referer {
        default     0;
        ~*babes     1;
        ~*forsale   1;
        ~*girl      1;
        ~*jewelry   1;
        ~*nudit     1;
        ~*organic   1;
        ~*poker     1;
        ~*porn      1;
        ~*sex       1;
        ~*teen      1;
    }

#    # Hotlink protection (uncomment to enable)
#    map $http_referer $block_hotlink {
#        default       1;   # block by default
#        ""            0;   # allow direct requests (curl, mobile apps)
#        ~*localhost   0;
#        ~*google\.    0;   # Google search preview
#        ~*telegram\.  0;   # Telegram link preview
#        ~*facebook\.  0;   # Facebook / WhatsApp OG preview
#        ~*twitter\.   0;   # Twitter card preview
#    }

    log_format main '[nginx] $remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent';
#     access_log syslog:server=unix:/dev/log,tag=nginx main;

    server {
        listen 80;
        server_name localhost;
        root /var/www/html/public/;
        include mime.types;

        if ($blocked_agent)   { return 403; }
        if ($blocked_referer) { return 403; }

        location / {
            index index.php;
            try_files $uri $uri/ /index.php?$args;
        }

        location ~ \.php$ {
            include fastcgi_params;

            fastcgi_pass                        unix:/var/run/php-fpm.sock;
            fastcgi_index                       index.php;
            fastcgi_buffers                     8 16k;
            fastcgi_buffer_size                 32k;
            fastcgi_read_timeout                60s;

            fastcgi_param DOCUMENT_ROOT         $realpath_root;
            fastcgi_param SCRIPT_FILENAME       $realpath_root$fastcgi_script_name;
            fastcgi_param HTTP_X_REAL_IP        $http_x_real_ip;
            fastcgi_param HTTP_X_FORWARDED_FOR  $http_x_forwarded_for;
        }

        location ~ /\.ht {
            deny all;
        }

        location /internal/chest/ {
            internal;
            alias /var/www/html/storage/chest/;
        }

#        location ~* \.(webp|jpg|jpeg|gif|png|svg|js|css|ico)$ {
#            expires 30d;
#            add_header Cache-Control "public, no-transform";
#
#            if ($block_hotlink) { return 403; }
#        }
    }
}