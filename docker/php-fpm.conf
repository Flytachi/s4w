[www]

; Unix user/group of FPM child processes
user = winter
group = winter

; FastCGI socket (unix socket or ip:port)
listen = /var/run/php-fpm.sock

; Allow nginx to access the socket
listen.group = nginx

; Process manager: static | dynamic | ondemand
pm = dynamic

; Maximum number of child processes (simultaneous requests)
;
; Formula: max_children = available_RAM / avg_PHP_process_memory
; Check avg memory: ps --no-headers -o "rss,cmd" -C php-fpm | awk '{sum+=$1} END {print sum/NR/1024 " MB"}'
;
; Recommended values based on available RAM:
; 512 MB RAM  →  max_children =  5–10  (small dev container)
; 1   GB RAM  →  max_children = 10–15  (light API / dev)
; 2   GB RAM  →  max_children = 20–30  (medium API, CRM)
; 4   GB RAM  →  max_children = 40–60  (production, ERP)
; 8   GB RAM  →  max_children = 80–120 (high-load backend)
;
pm.max_children = 25

; Child processes created on startup = (min_spare + max_spare) / 2
pm.start_servers = 8

; Min idle processes (~20% of max_children)
pm.min_spare_servers = 5

; Max idle processes (~40% of max_children)
pm.max_spare_servers = 10

; Requests per child before respawn (0 = unlimited)
;
; Recommended values:
; Development                     500   (frequent restarts acceptable)
; Production (stable app)           0   (no limit, maximize performance)
; Production (memory leak risk)   500–1000
; Apps using Thread/async jobs    200–500 (child processes add memory pressure)
;
pm.max_requests = 500

; FPM status page URI (uncomment to enable: GET /status)
;pm.status_path = /status

; Slow request log (requires slowlog path)
;slowlog = log/$pool.slow.log
;request_slowlog_timeout = 5s

; Kill request after timeout (must match nginx fastcgi_read_timeout)
;
; Recommended values:
; API / CRM / ERP (standard)      60s
; File uploads / imports         120–300s
; Long background tasks          300s+
; Development (no timeout)         0
;
request_terminate_timeout = 60s

; Capture worker stdout/stderr into main FPM error log
;catch_workers_output = yes

; Pass all ENV variables from host to PHP workers (getenv(), $_ENV, $_SERVER)
clear_env = no

; Per-worker PHP ini overrides
;php_flag[display_errors] = off
php_admin_value[error_log] = syslog
php_admin_flag[log_errors] = on
;
; Recommended memory_limit based on application type:
; Small API / blog                   64M
; CRM / ERP / e-commerce            128M
; File processing / imports         256M
; Data-heavy reports / exports      512M+
;
;php_admin_value[memory_limit] = 128M